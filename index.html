
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>5-DOF Robotic Arm Simulator v7</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;700&display=swap');

:root {
  --bg:        #080d14;
  --panel:     rgba(8,16,28,0.92);
  --border:    rgba(30,120,255,0.25);
  --accent:    #1e78ff;
  --accent2:   #00e5ff;
  --warn:      #ffaa00;
  --ok:        #22c55e;
  --err:       #f97316;
  --text:      #c8d8f0;
  --mono:      'Share Tech Mono', monospace;
  --sans:      'Exo 2', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
}

/* ── PANELS ─────────────────────────────────── */
.panel {
  position: absolute;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 10px;
  backdrop-filter: blur(12px);
  padding: 14px;
}

/* LEFT — joint controls */
#ui {
  top: 10px; left: 10px;
  width: 270px;
}

#ui h3 {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--accent2);
  margin-bottom: 12px;
  border-bottom: 1px solid var(--border);
  padding-bottom: 6px;
}

.joint-row {
  margin-bottom: 10px;
}

.joint-label {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 3px;
  font-size: 12px;
}

.joint-name {
  color: var(--text);
  font-weight: 600;
  letter-spacing: 1px;
  font-size: 11px;
  text-transform: uppercase;
}

.joint-val {
  font-family: var(--mono);
  color: var(--accent2);
  font-size: 12px;
  min-width: 48px;
  text-align: right;
}

.joint-limits {
  font-family: var(--mono);
  font-size: 9px;
  color: rgba(100,140,200,0.5);
}

input[type=range] {
  width: 100%;
  height: 4px;
  -webkit-appearance: none;
  appearance: none;
  background: rgba(30,120,255,0.2);
  border-radius: 2px;
  outline: none;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 8px var(--accent);
  cursor: pointer;
}

/* coord display */
.coord-display {
  background: rgba(30,120,255,0.08);
  border: 1px solid var(--border);
  padding: 8px 10px;
  border-radius: 6px;
  margin: 10px 0;
  font-family: var(--mono);
  font-size: 12px;
  line-height: 1.7;
}

.coord-display strong {
  display: block;
  color: var(--accent2);
  font-size: 10px;
  letter-spacing: 2px;
  margin-bottom: 4px;
}

/* IK input */
.ik-box {
  background: rgba(255,170,0,0.06);
  border: 1px solid rgba(255,170,0,0.2);
  border-radius: 6px;
  padding: 10px;
  margin-top: 10px;
}

.ik-box strong {
  display: block;
  color: var(--warn);
  font-size: 10px;
  letter-spacing: 2px;
  margin-bottom: 8px;
}

.ik-row { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
.ik-row label { font-size: 11px; color: var(--text); width: 14px; }
.ik-row input[type=number] {
  flex: 1;
  padding: 4px 6px;
  background: rgba(20,30,50,0.9);
  border: 1px solid rgba(30,120,255,0.35);
  border-radius: 4px;
  color: white;
  font-family: var(--mono);
  font-size: 12px;
  outline: none;
}

.btn {
  width: 100%;
  padding: 7px;
  margin-top: 6px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  font-family: var(--sans);
  font-weight: 600;
  font-size: 12px;
  letter-spacing: 1px;
  transition: filter 0.15s, transform 0.1s;
}
.btn:hover { filter: brightness(1.25); transform: translateY(-1px); }
.btn:active { transform: translateY(0); }
.btn-blue { background: var(--accent); color: white; }
.btn-green { background: var(--ok); color: white; }
.btn-orange { background: var(--warn); color: #000; }
.btn-red { background: #ef4444; color: white; }
.btn-indigo { background: #6366f1; color: white; }

/* trajectory indicator */
#trajBar {
  display: none;
  width: 100%;
  height: 3px;
  background: rgba(30,120,255,0.15);
  border-radius: 2px;
  margin-top: 6px;
  overflow: hidden;
}
#trajFill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius: 2px;
  transition: width 0.03s linear;
}

/* RIGHT — control bar */
#controlBar {
  top: 10px; right: 10px;
  display: flex;
  gap: 8px;
  align-items: center;
  padding: 10px 14px;
}

#controlBar button {
  padding: 6px 13px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  font-family: var(--sans);
  font-weight: 600;
  font-size: 12px;
  color: white;
  transition: filter 0.15s;
}
#controlBar button:hover { filter: brightness(1.2); }

/* blynk status pill */
#blynkStatus {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 5px 10px;
  background: rgba(10,18,34,0.9);
  border: 1px solid var(--border);
  border-radius: 999px;
  font-size: 11px;
  font-family: var(--mono);
}

#blynkDot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #64748b;
  display: inline-block;
  transition: background 0.4s, box-shadow 0.4s;
}

/* BOTTOM — trajectory info */
#trajPanel {
  bottom: 10px; left: 50%; transform: translateX(-50%);
  padding: 8px 16px;
  display: none;
  font-family: var(--mono);
  font-size: 11px;
  gap: 20px;
  flex-direction: row;
  align-items: center;
}

/* HZ counter */
#hzDisplay {
  position: absolute;
  bottom: 10px; right: 10px;
  font-family: var(--mono);
  font-size: 10px;
  color: rgba(100,140,200,0.4);
}

/* scan line overlay */
body::after {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.03) 2px,
    rgba(0,0,0,0.03) 4px
  );
  pointer-events: none;
  z-index: 999;
}
</style>
</head>
<body>

<!-- LEFT PANEL -->
<div id="ui" class="panel">
  <h3>◈ 5-DOF JOINT CONTROL</h3>

  <div class="joint-row">
    <div class="joint-label">
      <span class="joint-name">Base (Yaw)</span>
      <span class="joint-limits">0° – 270°</span>
      <span class="joint-val" id="v0">211.9°</span>
    </div>
    <input id="j0" type="range" min="0" max="270" value="211.9">
  </div>

  <div class="joint-row">
    <div class="joint-label">
      <span class="joint-name">Shoulder</span>
      <span class="joint-limits">0° – 270°</span>
      <span class="joint-val" id="v1">177.4°</span>
    </div>
    <input id="j1" type="range" min="0" max="270" value="177.4">
  </div>

  <div class="joint-row">
    <div class="joint-label">
      <span class="joint-name">Elbow</span>
      <span class="joint-limits">0° – 270°</span>
      <span class="joint-val" id="v2">224.3°</span>
    </div>
    <input id="j2" type="range" min="0" max="270" value="224.3">
  </div>

  <div class="joint-row">
    <div class="joint-label">
      <span class="joint-name">Wrist Pitch</span>
      <span class="joint-limits">0° – 180°</span>
      <span class="joint-val" id="v4">141.4°</span>
    </div>
    <input id="j4" type="range" min="0" max="180" value="141.4">
  </div>

  <div class="joint-row">
    <div class="joint-label">
      <span class="joint-name">Claw Grip</span>
      <span class="joint-limits">0% – 100%</span>
      <span class="joint-val" id="v3">100%</span>
    </div>
    <input id="j3" type="range" min="0" max="100" value="100">
  </div>

  <div class="coord-display">
    <strong>▸ END-EFFECTOR POSITION</strong>
    X: <span id="posX">0.00</span> &nbsp;
    Y: <span id="posY">0.00</span> &nbsp;
    Z: <span id="posZ">0.00</span>
  </div>

  <div class="ik-box">
    <strong>◈ INVERSE KINEMATICS TARGET</strong>
    <div class="ik-row">
      <label>X</label><input type="number" id="inputX" step="0.1" value="0">
    </div>
    <div class="ik-row">
      <label>Y</label><input type="number" id="inputY" step="0.1" value="6">
    </div>
    <div class="ik-row">
      <label>Z</label><input type="number" id="inputZ" step="0.1" value="5">
    </div>
    <button class="btn btn-blue" onclick="startIKMove()">▶ Execute Trajectory</button>
    <button class="btn btn-red" id="abortBtn" onclick="abortTrajectory()" style="display:none; margin-top:4px;">■ Abort</button>
    <div id="trajBar"><div id="trajFill"></div></div>
    <div id="trajStatus" style="font-family:var(--mono); font-size:10px; color:var(--accent2); margin-top:4px; min-height:14px;"></div>
  </div>
</div>

<!-- RIGHT — record / save / load / blynk -->
<div id="controlBar" class="panel">
  <button id="recordBtn" style="background:#22c55e;">Record</button>
  <button id="saveBtn"   style="background:#1f6cff;">Save</button>
  <label style="cursor:pointer; background:#334155; padding:6px 10px; border-radius:5px; font-size:12px; font-weight:600;">
    Load <input id="loadInput" type="file" accept=".arm,.txt" style="display:none;">
  </label>

  <div id="blynkStatus">
    <span id="blynkDot"></span>
    <span id="blynkText">Checking…</span>
    <span id="blynkHz" style="color:rgba(100,200,255,0.5); font-size:9px;">— Hz</span>
  </div>
</div>

<!-- Hz readout -->
<div id="hzDisplay">SIM 60fps · BLYNK 1Hz</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158/build/three.min.js"></script>
<script>
'use strict';

// ════════════════════════════════════════════════
// BLYNK CONFIG
// ════════════════════════════════════════════════
const BLYNK_AUTH_TOKEN           = "54hl-vgooPEeF6NUHLhdeM9rUtQ5dWvK";
const BLYNK_SERVER               = "https://blynk.cloud";
const BLYNK_INTERVAL_MS          = 1000;   // 1 Hz — Blynk External API limit
const BLYNK_STATUS_CHECK_MS      = 5000;

let blynkUpdateTimer  = null;
let blynkStatusTimer  = null;
let blynkSending      = false;   // prevent overlapping requests
let blynkLastOk       = false;

async function updateBlynkVirtualPins() {
  if (blynkSending) return;   // skip if previous request still in-flight
  blynkSending = true;

  const dotEl  = document.getElementById("blynkDot");
  const textEl = document.getElementById("blynkText");
  const hzEl   = document.getElementById("blynkHz");

  const pins = [
    { pin: "V1", val: Math.round(state.base) },
    { pin: "V2", val: Math.round(state.shoulder) },
    { pin: "V3", val: Math.round(state.elbow) },
    { pin: "V4", val: Math.round(state.wrist) },
    { pin: "V5", val: Math.round(state.claw) }
  ];

  try {
    // Send each pin individually in parallel (batch API not supported on free plan)
    const results = await Promise.all(pins.map(({ pin, val }) =>
      fetch(`${BLYNK_SERVER}/external/api/update?token=${BLYNK_AUTH_TOKEN}&${pin}=${val}`)
        .then(r => ({ pin, status: r.status, ok: r.ok }))
        .catch(e => ({ pin, status: 0, ok: false }))
    ));

    const allOk = results.every(r => r.ok);
    const anyFail = results.find(r => !r.ok);

    if (allOk) {
      blynkLastOk = true;
      if (dotEl)  { dotEl.style.background = "#22c55e"; dotEl.style.boxShadow = "0 0 8px rgba(34,197,94,0.8)"; }
      if (textEl) textEl.textContent = "Sending ✓";
      if (hzEl)   hzEl.textContent   = "1 Hz";
    } else {
      blynkLastOk = false;
      if (dotEl)  { dotEl.style.background = "#f97316"; dotEl.style.boxShadow = "none"; }
      if (textEl) textEl.textContent = `Err ${anyFail.pin} ${anyFail.status}`;
      console.warn("Blynk pin update failed:", results);
    }
  } catch (e) {
    blynkLastOk = false;
    if (dotEl)  { dotEl.style.background = "#f97316"; dotEl.style.boxShadow = "none"; }
    if (textEl) textEl.textContent = "Net Error";
    console.warn("Blynk fetch failed:", e);
  } finally {
    blynkSending = false;
  }
}

function startBlynkUpdates() {
  if (blynkUpdateTimer) clearInterval(blynkUpdateTimer);
  updateBlynkVirtualPins();   // fire immediately on load
  blynkUpdateTimer = setInterval(updateBlynkVirtualPins, BLYNK_INTERVAL_MS);
}

function updateBlynkStatus() {
  // Status check is now combined into the update function itself.
  // This is a no-op kept so startBlynkStatus() call below still works.
}

function startBlynkStatus() {
  if (blynkStatusTimer) clearInterval(blynkStatusTimer);
  // Status is reflected live via updateBlynkVirtualPins — no separate poll needed.
}

// ════════════════════════════════════════════════
// THREE.JS SCENE
// ════════════════════════════════════════════════
const scene    = new THREE.Scene();
scene.background = new THREE.Color(0x060c15);
scene.fog = new THREE.FogExp2(0x060c15, 0.035);

const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 200);
camera.position.set(12, 12, 18);
camera.lookAt(0, 5, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// Lights
scene.add(new THREE.AmbientLight(0xc8d8ff, 1.1));
const sun = new THREE.DirectionalLight(0xffffff, 1.8);
sun.position.set(10, 20, 10);
sun.castShadow = true;
sun.shadow.mapSize.set(1024, 1024);
scene.add(sun);
const fill = new THREE.PointLight(0x4488ff, 1.2, 35);
fill.position.set(-5, 8, -5);
scene.add(fill);
const rimLight = new THREE.PointLight(0x00e5ff, 0.6, 20);
rimLight.position.set(5, 2, -8);
scene.add(rimLight);

// Grid
const gridHelper = new THREE.GridHelper(24, 24, 0x1a3060, 0x0d1e40);
scene.add(gridHelper);
scene.add(new THREE.AxesHelper(3));

// ════════════════════════════════════════════════
// MATERIALS
// ════════════════════════════════════════════════
const matBlue = new THREE.MeshStandardMaterial({
  color: 0x2e90ff, metalness: 0.3, roughness: 0.45
});
const matJoint = new THREE.MeshStandardMaterial({
  color: 0x55aaff, metalness: 0.5, roughness: 0.3,
  emissive: 0x0a2050, emissiveIntensity: 0.4
});
const matBase = new THREE.MeshStandardMaterial({
  color: 0xffffff, metalness: 0.25, roughness: 0.55
});
const matClaw = new THREE.MeshStandardMaterial({
  color: 0x3388ff, metalness: 0.4, roughness: 0.4
});
const matGear = new THREE.MeshStandardMaterial({
  color: 0xdddddd, metalness: 0.9, roughness: 0.2
});

// ════════════════════════════════════════════════
// ROBOT ARM — 5 DOF
// ════════════════════════════════════════════════
// Hierarchy:
//  scene
//    └─ baseYawGroup  (rotate Y = base yaw)
//         └─ pedestalMesh
//         └─ shoulderPivot  (rotate Z = shoulder pitch)
//              └─ upperArmMesh
//              └─ elbowPivot  (rotate Z = elbow)
//                   └─ foreArmMesh
//                   └─ wristPivot  (rotate Z = wrist pitch)
//                        └─ wristMesh
//                        └─ clawGroup  (finger spread)

function makeCylMesh(rt, rb, h, segs, mat) {
  const g = new THREE.CylinderGeometry(rt, rb, h, segs);
  const m = new THREE.Mesh(g, mat);
  m.castShadow = true; m.receiveShadow = true;
  return m;
}
function makeBoxMesh(w, h, d, mat) {
  const g = new THREE.BoxGeometry(w, h, d);
  const m = new THREE.Mesh(g, mat);
  m.castShadow = true; m.receiveShadow = true;
  return m;
}
function makeSphere(r, segs, mat) {
  const m = new THREE.Mesh(new THREE.SphereGeometry(r, segs, segs), mat);
  m.castShadow = true;
  return m;
}

// ── Base platform ──
const baseYawGroup = new THREE.Group();
scene.add(baseYawGroup);

const platformBase = makeCylMesh(2.2, 2.6, 0.6, 32, matBase);
platformBase.position.y = 0.3;
baseYawGroup.add(platformBase);

const platformTop = makeCylMesh(2.0, 2.2, 1.2, 32, matBlue);
platformTop.position.y = 1.2;
baseYawGroup.add(platformTop);

// base joint ball
const baseJoint = makeSphere(1.1, 20, matJoint);
baseJoint.position.y = 1.8;
baseYawGroup.add(baseJoint);

// ── Shoulder ──
const shoulderPivot = new THREE.Group();
shoulderPivot.position.y = 1.8;
baseYawGroup.add(shoulderPivot);

const shoulderJointRing = makeCylMesh(1.0, 1.0, 0.5, 24, matJoint);
shoulderJointRing.rotation.z = Math.PI / 2;
shoulderPivot.add(shoulderJointRing);

// upper arm
const upperArmGroup = new THREE.Group();
shoulderPivot.add(upperArmGroup);

const upperArm = makeBoxMesh(1.3, 5.5, 1.3, matBlue);
upperArm.position.y = 2.75;
upperArmGroup.add(upperArm);

// elbow joint visual
const elbowBall = makeSphere(0.85, 20, matJoint);
elbowBall.position.y = 5.5;
upperArmGroup.add(elbowBall);

// ── Elbow ──
const elbowPivot = new THREE.Group();
elbowPivot.position.y = 5.5;
shoulderPivot.add(elbowPivot);

const elbowRing = makeCylMesh(0.85, 0.85, 0.45, 24, matJoint);
elbowRing.rotation.z = Math.PI / 2;
elbowPivot.add(elbowRing);

const foreArm = makeBoxMesh(1.1, 4.8, 1.1, matBlue);
foreArm.position.y = 2.4;
elbowPivot.add(foreArm);

const wristBall = makeSphere(0.7, 20, matJoint);
wristBall.position.y = 4.8;
elbowPivot.add(wristBall);

// ── Wrist ──
const wristPivot = new THREE.Group();
wristPivot.position.y = 4.8;
elbowPivot.add(wristPivot);

const wristBody = makeBoxMesh(0.9, 1.2, 0.9, matBlue);
wristBody.position.y = 0.6;
wristPivot.add(wristBody);

// gear disc
const gearDisc = makeCylMesh(0.55, 0.55, 0.2, 16, matGear);
gearDisc.rotation.z = Math.PI / 2;
gearDisc.position.y = 1.2;
wristPivot.add(gearDisc);

// ── Claw / end-effector — 2-jaw parallel gripper ──
const clawGroup = new THREE.Group();
clawGroup.position.y = 1.3;
wristPivot.add(clawGroup);

// Palm block (the mounting body between wrist and jaws)
const clawBase = makeBoxMesh(1.1, 0.5, 0.55, matClaw);
clawBase.position.y = 0.25;
clawGroup.add(clawBase);

// Gear/servo knob on top of palm
const clawKnob = makeCylMesh(0.28, 0.28, 0.22, 12, matGear);
clawKnob.position.y = 0.55;
clawGroup.add(clawKnob);

// LEFT jaw pivot — slides along X axis
const leftJawPivot = new THREE.Group();
leftJawPivot.position.set(-0.38, 0.5, 0);
clawGroup.add(leftJawPivot);

// left jaw: base segment (vertical)
const leftJawBase = makeBoxMesh(0.22, 0.75, 0.3, matClaw);
leftJawBase.position.y = 0.375;
leftJawPivot.add(leftJawBase);

// left jaw: tip curls inward (rotated box at top)
const leftJawTip = makeBoxMesh(0.2, 0.48, 0.28, matClaw);
leftJawTip.position.set(0.1, 0.75 + 0.18, 0);
leftJawTip.rotation.z = -Math.PI / 5;
leftJawPivot.add(leftJawTip);

// RIGHT jaw pivot
const rightJawPivot = new THREE.Group();
rightJawPivot.position.set(0.38, 0.5, 0);
clawGroup.add(rightJawPivot);

const rightJawBase = makeBoxMesh(0.22, 0.75, 0.3, matClaw);
rightJawBase.position.y = 0.375;
rightJawPivot.add(rightJawBase);

const rightJawTip = makeBoxMesh(0.2, 0.48, 0.28, matClaw);
rightJawTip.position.set(-0.1, 0.75 + 0.18, 0);
rightJawTip.rotation.z = Math.PI / 5;
rightJawPivot.add(rightJawTip);

// ── End-effector marker ──
const eeMarker = new THREE.Mesh(
  new THREE.SphereGeometry(0.15, 12, 12),
  new THREE.MeshStandardMaterial({
    color: 0xff2020, emissive: 0xff2020, emissiveIntensity: 1.0,
    transparent: true, opacity: 0.85
  })
);
clawGroup.add(eeMarker);

// ════════════════════════════════════════════════
// STATE (degrees)
// ════════════════════════════════════════════════
const LIMITS = {
  base:     { min:   0, max: 180 },
  shoulder: { min:   0, max: 180 },
  elbow:    { min:   0, max: 180 },
  wrist:    { min:   0, max: 180 },
  claw:     { min:   0, max: 100 }
};

const state = {
  base: 211.9, shoulder: 177.4, elbow: 224.3, wrist: 141.4, claw: 100
};

const d2r = d => d * Math.PI / 180;

function clampState() {
  for (const k of Object.keys(LIMITS)) {
    state[k] = Math.max(LIMITS[k].min, Math.min(LIMITS[k].max, state[k]));
  }
}

// ════════════════════════════════════════════════
// APPLY STATE → 3-D
// ════════════════════════════════════════════════
function applyState() {
  clampState();

  // Base yaw: 135° = centre, full range 0-270
  baseYawGroup.rotation.y = d2r(state.base - 135);

  // Shoulder: 135° = straight up (neutral), 0 = backward, 270 = forward fold
  shoulderPivot.rotation.z = d2r(-(state.shoulder - 135));

  // Elbow: 90° = straight, 0-270
  elbowPivot.rotation.z = d2r(state.elbow - 90);

  // Wrist pitch: 90° = neutral
  wristPivot.rotation.z = d2r(state.wrist - 90);

  // Claw grip: 0% = closed (jaws together), 100% = open (jaws apart)
  // Jaws slide outward on X axis — max spread ±0.30 units each side
  const maxSpread = 0.30;
  const t = state.claw / 100;
  leftJawPivot.position.x  = -(0.38 + maxSpread * t);
  rightJawPivot.position.x =  (0.38 + maxSpread * t);
}

// ════════════════════════════════════════════════
// FORWARD KINEMATICS (for IK seed / display)
// ════════════════════════════════════════════════
const L1 = 5.5, L2 = 4.8, L3 = 1.3 + 0.6; // link lengths (approx with claw)
const BASE_H = 1.8;

function forwardKinematics(base, shoulder, elbow, wrist) {
  const baseR    = d2r(base - 135);
  const sR       = d2r(-(shoulder - 135));  // shoulder rotation.z
  const eR       = d2r(elbow - 90);
  const wR       = d2r(wrist - 90);

  // In the local shoulder plane (before base yaw)
  // shoulder rotates the arm backward/forward about Z
  // elbow bends relative to upper arm
  const a1 = sR;
  const a2 = sR + eR;
  const a3 = a2 + wR;

  // XZ position in shoulder plane (X = horizontal, Y = vertical)
  const px = L1 * Math.cos(-a1) + L2 * Math.cos(-a2) + L3 * Math.cos(-a3);
  const py = L1 * Math.sin(-a1) + L2 * Math.sin(-a2) + L3 * Math.sin(-a3);

  // rotate by base yaw
  const wx = px * Math.sin(baseR);
  const wz = px * Math.cos(baseR);
  const wy = py + BASE_H;

  return { x: wx, y: wy, z: wz };
}

function getEndEffectorWorldPos() {
  renderer.render(scene, camera); // ensure matrices up to date
  const v = new THREE.Vector3();
  eeMarker.getWorldPosition(v);
  return v;
}

// ════════════════════════════════════════════════
// UI SYNC
// ════════════════════════════════════════════════
const sliders = {
  base: document.getElementById('j0'),
  shoulder: document.getElementById('j1'),
  elbow: document.getElementById('j2'),
  wrist: document.getElementById('j4'),
  claw: document.getElementById('j3')
};
const labels = {
  base: document.getElementById('v0'),
  shoulder: document.getElementById('v1'),
  elbow: document.getElementById('v2'),
  wrist: document.getElementById('v4'),
  claw: document.getElementById('v3')
};

function syncUIAndScene() {
  clampState();
  for (const k of Object.keys(sliders)) {
    sliders[k].value = state[k];
    labels[k].textContent = (k === 'claw') ? state[k].toFixed(0) + '%' : state[k].toFixed(1) + '°';
  }
  applyState();
  renderer.render(scene, camera);
  updatePositionDisplay();
}

function updatePositionDisplay() {
  const pos = getEndEffectorWorldPos();
  document.getElementById('posX').textContent = pos.x.toFixed(2);
  document.getElementById('posY').textContent = pos.y.toFixed(2);
  document.getElementById('posZ').textContent = pos.z.toFixed(2);
}

// Slider events
for (const k of Object.keys(sliders)) {
  sliders[k].oninput = () => {
    if (trajActive) abortTrajectory();
    state[k] = Number(sliders[k].value);
    syncUIAndScene();
  };
}

syncUIAndScene();

// ════════════════════════════════════════════════
// INVERSE KINEMATICS — gradient descent with analytical seed
// ════════════════════════════════════════════════
function solveIK(tx, ty, tz) {
  // Attempt analytical solve first as seed
  // base yaw = atan2(tx, tz)
  const baseRad  = Math.atan2(tx, tz);
  const baseDeg  = baseRad * 180 / Math.PI + 135;

  // horizontal reach from shoulder
  const horizDist = Math.sqrt(tx*tx + tz*tz);
  const vertDist  = ty - BASE_H;
  const totalDist = Math.sqrt(horizDist*horizDist + vertDist*vertDist);

  if (totalDist > L1 + L2 + 0.5) {
    return null; // out of reach
  }

  // Cosine rule for elbow
  const cosE = (totalDist*totalDist - L1*L1 - L2*L2) / (2*L1*L2);
  const clampedCosE = Math.max(-1, Math.min(1, cosE));
  const elbowLocal  = Math.acos(clampedCosE); // 0 = extended

  // shoulder angle
  const alpha = Math.atan2(vertDist, horizDist);
  const beta  = Math.acos(Math.max(-1, Math.min(1, (L1*L1 + totalDist*totalDist - L2*L2) / (2*L1*totalDist))));
  const shoulderLocal = alpha + beta; // angle above horizontal

  // Convert to our degree convention
  let shoulderDeg = -(shoulderLocal * 180 / Math.PI) + 135;
  let elbowDeg    = elbowLocal * 180 / Math.PI + 90;

  // Clamp to limits
  const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
  let best = {
    base:     clamp(baseDeg,     LIMITS.base.min,     LIMITS.base.max),
    shoulder: clamp(shoulderDeg, LIMITS.shoulder.min, LIMITS.shoulder.max),
    elbow:    clamp(elbowDeg,    LIMITS.elbow.min,    LIMITS.elbow.max),
    wrist:    state.wrist  // preserve current wrist
  };

  // Gradient descent refinement
  function getError(b, s, e, w) {
    const savedBase = state.base, savedShoulder = state.shoulder;
    const savedElbow = state.elbow, savedWrist = state.wrist;
    state.base = b; state.shoulder = s; state.elbow = e; state.wrist = w;
    applyState();
    const pos = getEndEffectorWorldPos();
    state.base = savedBase; state.shoulder = savedShoulder;
    state.elbow = savedElbow; state.wrist = savedWrist;
    applyState();
    return Math.sqrt((pos.x-tx)**2 + (pos.y-ty)**2 + (pos.z-tz)**2);
  }

  let step = 3.0;
  for (let iter = 0; iter < 300; iter++) {
    const curErr = getError(best.base, best.shoulder, best.elbow, best.wrist);
    if (curErr < 0.08) break;

    let improved = false;
    for (const joint of ['base','shoulder','elbow','wrist']) {
      const orig = best[joint];
      for (const dir of [-1, 1]) {
        const nv = clamp(orig + dir*step, LIMITS[joint].min, LIMITS[joint].max);
        const tmp = {...best, [joint]: nv};
        const err = getError(tmp.base, tmp.shoulder, tmp.elbow, tmp.wrist);
        if (err < curErr - 0.001) {
          best[joint] = nv;
          improved = true;
          break;
        }
      }
    }
    if (!improved) step *= 0.65;
    if (step < 0.05) break;
  }

  const finalErr = getError(best.base, best.shoulder, best.elbow, best.wrist);
  if (finalErr > 0.5) return null;

  return best;
}

// ════════════════════════════════════════════════
// TRAJECTORY PLANNER — trapezoidal velocity profile
// ════════════════════════════════════════════════
//  Phase 1: accelerate  (0 → peak speed)
//  Phase 2: cruise      (peak speed)
//  Phase 3: decelerate  (peak speed → 0)
//
// All joints are time-synchronised so they arrive together.

const TRAJ_HZ      = 120;    // internal update rate (Hz)
const TRAJ_DT      = 1000 / TRAJ_HZ;
const ACCEL_FRAC   = 0.30;  // fraction of total time for accel/decel each
const MIN_DUR_MS   = 400;   // minimum motion duration
const SPEED_DEG_S  = 160;   // cruise speed in deg/s for longest joint

let trajActive    = false;
let trajTimer     = null;
let trajTarget    = null;
let trajStart     = null;
let trajDur       = 0;
let trajProgress  = 0;

function trapezoidPos(t_norm) {
  // t_norm ∈ [0,1]; returns position fraction [0,1]
  const ta = ACCEL_FRAC, td = ACCEL_FRAC;
  const tc = 1 - ta - td;
  const vPeak = 1 / (ta/2 + tc + td/2);

  if (t_norm <= ta) {
    return 0.5 * vPeak / ta * t_norm * t_norm;
  } else if (t_norm <= ta + tc) {
    const dt = t_norm - ta;
    return 0.5 * vPeak * ta + vPeak * dt;
  } else {
    const dt = t_norm - ta - tc;
    const s0 = 0.5 * vPeak * ta + vPeak * tc;
    return s0 + vPeak * dt - 0.5 * (vPeak / td) * dt * dt;
  }
}

function abortTrajectory() {
  if (trajTimer) { clearInterval(trajTimer); trajTimer = null; }
  trajActive = false;
  document.getElementById('trajBar').style.display = 'none';
  document.getElementById('abortBtn').style.display = 'none';
  document.getElementById('trajStatus').textContent = '⚠ Aborted';
  document.getElementById('trajFill').style.width = '0%';
}

function startIKMove() {
  const tx = parseFloat(document.getElementById('inputX').value);
  const ty = parseFloat(document.getElementById('inputY').value);
  const tz = parseFloat(document.getElementById('inputZ').value);

  if (isNaN(tx) || isNaN(ty) || isNaN(tz)) {
    document.getElementById('trajStatus').textContent = '✖ Invalid coordinates';
    return;
  }

  abortTrajectory();

  document.getElementById('trajStatus').textContent = '⟳ Solving IK…';

  // Solve IK
  const result = solveIK(tx, ty, tz);

  if (!result) {
    document.getElementById('trajStatus').textContent = '✖ Target unreachable!';
    return;
  }

  // Plan trajectory
  const joints = ['base','shoulder','elbow','wrist'];
  const deltas = joints.map(j => Math.abs(result[j] - state[j]));
  const maxDelta = Math.max(...deltas, 1);

  // Duration based on speed of the slowest joint
  let dur = (maxDelta / SPEED_DEG_S) * 1000;
  dur = Math.max(dur, MIN_DUR_MS);

  const start = { ...state };
  trajTarget = result;
  trajDur    = dur;
  trajStart  = null;
  trajActive = true;
  trajProgress = 0;

  document.getElementById('trajBar').style.display = 'block';
  document.getElementById('abortBtn').style.display = 'block';
  document.getElementById('trajStatus').textContent = `▶ Executing… (${(dur/1000).toFixed(1)}s)`;

  if (trajTimer) clearInterval(trajTimer);

  trajTimer = setInterval(() => {
    if (!trajStart) trajStart = performance.now();
    const elapsed = performance.now() - trajStart;
    const tNorm   = Math.min(elapsed / dur, 1.0);
    const sFrac   = Math.min(trapezoidPos(tNorm), 1.0);

    for (const j of joints) {
      state[j] = start[j] + (result[j] - start[j]) * sFrac;
    }

    syncUIAndScene();
    trajProgress = tNorm;

    document.getElementById('trajFill').style.width = (tNorm * 100).toFixed(1) + '%';

    if (tNorm >= 1.0) {
      clearInterval(trajTimer);
      trajTimer = null;
      trajActive = false;
      document.getElementById('trajBar').style.display = 'none';
      document.getElementById('abortBtn').style.display = 'none';
      document.getElementById('trajStatus').textContent = '✔ Reached target';
    }
  }, TRAJ_DT);
}

// ════════════════════════════════════════════════
// RECORDING / PLAYBACK
// ════════════════════════════════════════════════
const SAMPLE_PERIOD = 100;
let recordState   = "idle";
let recordData    = [];
let recordTimer2  = null;
let playTimer2    = null;
let recordStartTime = 0, recordTotalTime = 0;
let playStartTime = 0, playElapsed = 0;

const recordBtn = document.getElementById('recordBtn');
const saveBtn   = document.getElementById('saveBtn');
const loadInput = document.getElementById('loadInput');

function setRecordButton(label, bg) {
  recordBtn.textContent = label;
  recordBtn.style.background = bg;
}

function sampleState(tMs) {
  recordData.push({ t: tMs, base: state.base, shoulder: state.shoulder,
    elbow: state.elbow, wrist: state.wrist, claw: state.claw });
}

function startRecording() {
  abortTrajectory();
  stopPlayInternal();
  recordState = "recording";
  recordData = [];
  recordStartTime = performance.now();
  sampleState(0);
  setRecordButton("Stop", "#ef4444");
  if (recordTimer2) clearInterval(recordTimer2);
  recordTimer2 = setInterval(() => {
    sampleState(performance.now() - recordStartTime);
  }, SAMPLE_PERIOD);
}

function stopRecording() {
  if (recordTimer2) { clearInterval(recordTimer2); recordTimer2 = null; }
  if (!recordData.length) { recordState = "idle"; setRecordButton("Record", "#22c55e"); return; }
  recordTotalTime = recordData[recordData.length-1].t;
  recordState = "idle"; playElapsed = 0;
  setRecordButton("Play", "#1f6cff");
}

function startPlayback() {
  if (!recordData.length) { alert("Nothing recorded."); return; }
  recordData.sort((a,b) => a.t - b.t);
  recordTotalTime = recordData[recordData.length-1].t;
  if (recordTotalTime <= 0) { alert("Recording too short."); return; }
  recordState = "playing";
  setRecordButton("Pause", "#f97316");
  playStartTime = performance.now() - playElapsed;
  if (playTimer2) clearInterval(playTimer2);
  playTimer2 = setInterval(() => {
    const elapsed = (performance.now() - playStartTime) % recordTotalTime;
    playElapsed = elapsed;
    let i = 0;
    while (i < recordData.length-1 && recordData[i+1].t < elapsed) i++;
    const k1 = recordData[i];
    const k2 = recordData[Math.min(i+1, recordData.length-1)];
    const span = Math.max(1, k2.t - k1.t);
    const t = Math.min((elapsed - k1.t) / span, 1);
    const lerp = (a,b) => a + (b-a)*t;
    state.base     = lerp(k1.base, k2.base);
    state.shoulder = lerp(k1.shoulder, k2.shoulder);
    state.elbow    = lerp(k1.elbow, k2.elbow);
    state.wrist    = lerp(k1.wrist, k2.wrist);
    state.claw     = lerp(k1.claw, k2.claw);
    syncUIAndScene();
  }, 20);
}

function pausePlayback() {
  if (playTimer2) { clearInterval(playTimer2); playTimer2 = null; }
  recordState = "idle";
  setRecordButton("Play", "#1f6cff");
}

function stopPlayInternal() {
  if (playTimer2) { clearInterval(playTimer2); playTimer2 = null; }
  playElapsed = 0;
}

recordBtn.addEventListener('click', () => {
  if (recordState === "idle") {
    if (recordBtn.textContent === "Record") startRecording();
    else if (recordBtn.textContent === "Play") startPlayback();
    else startRecording();
  } else if (recordState === "recording") {
    stopRecording();
  } else if (recordState === "playing") {
    pausePlayback();
  }
});

saveBtn.addEventListener('click', () => {
  if (!recordData.length) { alert("Nothing to save."); return; }
  const payload = {
    meta: { type: "robotArmRecording", version: 2, dof: 5, samplePeriodMs: SAMPLE_PERIOD },
    data: recordData
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], {type:'text/plain'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'arm5dof.arm'; document.body.appendChild(a); a.click();
  document.body.removeChild(a);
});

loadInput.addEventListener('change', e => {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const payload = JSON.parse(ev.target.result);
      if (!payload.meta || !Array.isArray(payload.data)) { alert("Invalid file."); return; }
      abortTrajectory(); stopPlayInternal();
      recordData = payload.data.map(k => ({
        t: +k.t||0, base:+k.base||135, shoulder:+k.shoulder||135,
        elbow:+k.elbow||90, wrist:+k.wrist||90, claw:+k.claw||50
      }));
      recordData.sort((a,b)=>a.t-b.t);
      recordTotalTime = recordData[recordData.length-1].t;
      recordState = "idle"; playElapsed = 0;
      setRecordButton("Play", "#1f6cff");
      const k0 = recordData[0];
      state.base = k0.base; state.shoulder = k0.shoulder;
      state.elbow = k0.elbow; state.wrist = k0.wrist; state.claw = k0.claw;
      syncUIAndScene();
    } catch { alert("Failed to load."); }
  };
  reader.readAsText(file);
  e.target.value = "";
});

// ════════════════════════════════════════════════
// DRAG ROTATION ON 3D MESHES
// ════════════════════════════════════════════════
const raycaster = new THREE.Raycaster();
const mouse     = new THREE.Vector2();
let dragging = false, dragTarget = null, dragStartX = 0, dragStartY = 0, dragStartVal = 0;

const pickables = [
  { mesh: platformTop,   type: 'base' },
  { mesh: platformBase,  type: 'base' },
  { mesh: baseJoint,     type: 'base' },
  { mesh: upperArm,      type: 'shoulder' },
  { mesh: foreArm,       type: 'elbow' },
  { mesh: wristBody,     type: 'wrist' },
  { mesh: clawBase,      type: 'claw' },
  { mesh: leftJawBase,   type: 'claw' },
  { mesh: rightJawBase,  type: 'claw' }
];

renderer.domElement.addEventListener('pointerdown', e => {
  const rect = renderer.domElement.getBoundingClientRect();
  mouse.set(
    ((e.clientX - rect.left) / rect.width)  * 2 - 1,
    -((e.clientY - rect.top)  / rect.height) * 2 + 1
  );
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(pickables.map(p=>p.mesh), false);
  if (hits.length) {
    const info = pickables.find(p => p.mesh === hits[0].object);
    if (info) {
      dragging = true; dragTarget = info.type;
      dragStartX = e.clientX; dragStartY = e.clientY;
      dragStartVal = state[dragTarget];
      if (trajActive) abortTrajectory();
    }
  }
});

window.addEventListener('pointermove', e => {
  if (!dragging) return;
  const dx = e.clientX - dragStartX;
  const dy = e.clientY - dragStartY;
  const f = 0.4;
  if (dragTarget === 'base')     state.base     = dragStartVal + dx * f;
  else if (dragTarget === 'shoulder') state.shoulder = dragStartVal - dy * f;
  else if (dragTarget === 'elbow')    state.elbow    = dragStartVal + dy * f;
  else if (dragTarget === 'wrist')    state.wrist    = dragStartVal + dy * f;
  else if (dragTarget === 'claw')     state.claw     = dragStartVal - dy * f;
  syncUIAndScene();
});

window.addEventListener('pointerup',    () => { dragging = false; dragTarget = null; });
window.addEventListener('pointerleave', () => { dragging = false; dragTarget = null; });

// ════════════════════════════════════════════════
// ORBIT CAMERA (right-click drag)
// ════════════════════════════════════════════════
let orbiting = false, orbitStart = {x:0,y:0};
let orbitTheta = Math.atan2(12,18), orbitPhi = Math.atan2(12, Math.sqrt(12*12+18*18));
let orbitDist = Math.sqrt(12*12+12*12+18*18);

renderer.domElement.addEventListener('contextmenu', e => e.preventDefault());
renderer.domElement.addEventListener('mousedown', e => {
  if (e.button === 2 || e.button === 1) {
    orbiting = true; orbitStart = {x: e.clientX, y: e.clientY};
  }
});
window.addEventListener('mousemove', e => {
  if (!orbiting) return;
  orbitTheta -= (e.clientX - orbitStart.x) * 0.005;
  orbitPhi   = Math.max(0.1, Math.min(Math.PI/2 - 0.05, orbitPhi - (e.clientY - orbitStart.y) * 0.005));
  orbitStart = {x: e.clientX, y: e.clientY};
  camera.position.set(
    orbitDist * Math.sin(orbitTheta) * Math.cos(orbitPhi),
    orbitDist * Math.sin(orbitPhi),
    orbitDist * Math.cos(orbitTheta) * Math.cos(orbitPhi)
  );
  camera.lookAt(0, 5, 0);
});
window.addEventListener('mouseup', () => { orbiting = false; });
renderer.domElement.addEventListener('wheel', e => {
  orbitDist = Math.max(5, Math.min(50, orbitDist + e.deltaY * 0.02));
  camera.position.setLength(orbitDist);
  camera.lookAt(0, 5, 0);
});

// ════════════════════════════════════════════════
// RENDER LOOP
// ════════════════════════════════════════════════
function animate() {
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
  if (!trajActive && !dragging) updatePositionDisplay();
}
animate();

// ════════════════════════════════════════════════
// RESIZE
// ════════════════════════════════════════════════
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ════════════════════════════════════════════════
// START BLYNK
// ════════════════════════════════════════════════
startBlynkUpdates();
startBlynkStatus();

</script>
